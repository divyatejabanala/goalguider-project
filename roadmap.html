<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalGuider | Roadmap</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/roadmap.css">

    <script src="js/guard.js"></script>
    <script>
      requireAuth();
      localStorage.removeItem("obBoarding-to-roadmap");
    </script>
</head>
<body>

    <div class="navbar">
        <div class="logo">🎯 GoalGuider</div>
        <div class="links">
            <a href="roadmap.html">Roadmap</a>
            <a href="tasks.html">Tasks</a>
            <a href="profile.html">Profile</a>
        </div>
        <div class="hamburger" onclick="toggleSidebar()">
            <div></div><div></div><div></div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="links">
            <a href="roadmap.html" onclick="closeSidebar()">Roadmap</a>
            <a href="tasks.html" onclick="closeSidebar()">Tasks</a>
            <a href="profile.html" onclick="closeSidebar()">Profile</a>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="stage">
      <div class="world" id="world">
        <div class="pole-shaft" id="pole"></div>
      </div>
    </div>

    <div id="scroll-spacer"></div>
    <div id="footer"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/roadmap_view.js"></script>

    <script> 
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }
        
        fetch("footer.html")
            .then(response => response.text())
            .then(data => { document.getElementById("footer").innerHTML = data; });
    </script>
</body>
</html>
