<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalGuider - Career Guidance</title>
    <!-- Font Awesome for icons (optional, but kept for social icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS (embedded here; move to styles.css if preferred) -->
    <style>
        /* Global Styles */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F8F9FA; /* Light background for the page */
        }

        /* container_foot Styles */
        .container_foot {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 15px;
            padding-right: 15px;
        }

        @media (min-width: 576px) {
            .container_foot {
                max-width: 540px;
            }
        }

        @media (min-width: 768px) {
            .container_foot {
                max-width: 720px;
            }
        }

        @media (min-width: 992px) {
            .container_foot {
                max-width: 960px;
            }
        }

        @media (min-width: 1200px) {
            .container_foot {
                max-width: 1140px;
            }
        }

        /* Footer Styles */
        .footer {
            background-color: #2C3E50;
            color: #FFFFFF;
            padding: 2rem 0;
            font-size: 0.9rem;
            border-top: 1px solid #34495E;
        }

        .footer .footer-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 2rem; /* Space between columns */
        }

        .footer .footer-col {
            flex: 1;
            min-width: 200px; /* Minimum width to prevent squishing */
        }

        .footer h5, .footer h6 {
            color: #ECF0F1;
            margin-bottom: 1rem;
        }

        .footer a {
            color: #BDC3C7;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #3498DB;
            text-decoration: underline;
        }

        .footer .list-unstyled {
            list-style: none;
            padding: 0;
        }

        .footer .list-unstyled li {
            margin-bottom: 0.5rem;
        }

        .footer .social-icons a {
            margin-right: 1rem;
            font-size: 1.2rem;
        }

        .footer .social-icons a:hover {
            color: #3498DB;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .footer .footer-row {
                flex-direction: column;
                text-align: center;
                gap: 1.5rem;
            }
            .footer .footer-col {
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>
